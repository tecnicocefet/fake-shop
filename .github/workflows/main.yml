name: CI-CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      
        
      - name: Autenticando no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        
      - name: Construção e envio da imagem docker
        uses: docker/build-push-action@v6
        with:
          context: ./src
          push: true
          file: ./src/Dockerfile
          tags: |
            tecnicocefet/fake-shop:latestg
            tecnicocefet/fake-shop:v${{github.run_number}} 
     
  cd:
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - name: Autenticando na AWS
        run: echo " Executando o comando aws configure"
      - name: Configurar o kubectl
        run: echo " Executando o comando aws eks update-kubeconfig" 
      - name: Deploy dos maifestos no kubernetes
        run: echo " Executando o comando kubectl apply"
  
  
